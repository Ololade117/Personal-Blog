{% extends "base.html" %}
{% block content %}

<h1>Create Post</h1>

<form action="/admin/new" method="post">
    <input
    type="text"
    name="title"
    placeholder="title"
    required
    >

    <br><br>
    <textarea
    name = "content"
    rows = "10"
    placeholder ="Write your post here ..."
    ></textarea>

    <br><br>
    <button type = "submit">
        Publish
    </button>
</form>

{% endblock %}
