{% extends "base.html" %}

{% block content%}

<h1>Edit Post</h1>

<form action="/admin/edit/{{ post.id }}" method="post">
    <input
    type="text"
    name="title"
    placeholder="title"
    value="{{ post.title }}"
    required
    >
<input type="text"
    name="tag" 
    value="{{ post.tag }}"
    placeholder="tag"
    >
    <br><br>
    <textarea
    name = "content"
    rows = "10"
    placeholder ="Write your post here ..."
    >{{ post.content }}</textarea>

    <br><br>
    <button type = "submit">
        Update
    </button>
</form> 

{% endblock %}
